<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Praktik Border 1 </title>
    <style>
        .solid {
            border: 3px solid blue;
            padding: 10px;
        }
        .dotted {
            border: 3px dotted red;
            padding: 10px;
        }
        .double {
            border: 5px double green;
            padding: 10px;
        }
        .dashed {
            border: 3px dashed red;
            padding: 10px;
        }
        .groove {
            border: 6px groove purple;
            padding: 10px;
        }
        .ridge {
            border: 6px ridge orange;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h2>Contob Border CSS</h2>

    <p class="solid">Ini border solid</p>
    <p class="dotted">Ini border dotted</p>
    <p class="double">Ini border double</p>
    <p class="dashed">Ini border dashed</p>
    <p class="groove">Ini border groove</p>
    <p class="ridge">Ini border ridge</p>
</body>
</html>
