<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> latihan 1 </title>
    <style>
        .solid {
            border: 3px solid black;
            padding: 10px;
            margin: 10px;
        }
        .double {
            border: 3px double blue;
            padding: 10px;
            margin: 10px;
        }
        .groove {
            border: 3px groove green;
            padding: 10px;
            margin: 10px;
        }
        .ridge {
            border: 3px ridge red;
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h2> Latihan border </h2>
    <div class="solid">Border solid warna hitam</div>
    <div class="double">Border double warna biru</div>
    <div class="groove">Border groove warna hijau</div>
    <div class="ridge">Border ridge warna merah</div>
</body>
</html>
