<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Fixed</title>

    <style> 
        .box { 
            position: fixed; 
            bottom: 0; 
            right: 0; 
            background-color: yellow; 
            padding: 10px; 
        } 
</style> 
</head>
<body>
    <div class="box">Fixed Position</div> 
</body>
</html>
