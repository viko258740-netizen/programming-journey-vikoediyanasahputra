<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Position Relative</title>
     <style>
        .box1 {
            position: relative;
            top: 5px;
            right: 10px;
            bottom: 40px;
            background-color: red;
            width: 150px;
            height: 150px;

        }
        .box2 {
             position: relative;
            right: 10px;
            bottom: 50px;
            background-color: orange;
            width: 150px;
            height: 150px;

        }
        .box3 {
             position: relative;
            right: 10px;
            bottom: 60px;
            background-color: skyblue;
            width: 150px;
            height: 150px;

        }
    </style>
</head>
<body>
    <div class="box1">Box Pertama</div>
    <div class="box2">Box Kedua</div>
    <div class="box3">Box Ketiga</div>
</body>
</html>
