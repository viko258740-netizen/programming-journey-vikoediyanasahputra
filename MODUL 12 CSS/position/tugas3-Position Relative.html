<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Relative</title>

    <style>
        .tangga { 
            width: 100px; 
            height: 50px; 
            background-color: #e74c3c; 
            border: 2px solid black;
            position: relative; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tangga1 { 
            background-color:aqua;
            left: 0px; 
        }
        .tangga2 { 
            background-color: coral;
            left: 100px; 
        }
        .tangga3 { 
            background-color: darkcyan;
            left: 200px; 
        }
    </style>
</head>
<body>
    <div class="tangga tangga1">Tangga 1</div>
    <div class="tangga tangga2">Tangga 2</div>
    <div class="tangga tangga3">Tangga 3</div>
</body>
</html>
