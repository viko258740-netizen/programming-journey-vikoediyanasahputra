<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Relative</title>
    
    <style> 
        .box { 
            position: relative; 
            left: 50px;
            top: 40px;
            background-color: lightblue; 
            width: 150px; 
            height: 150px; 
        } 
    </style>
</head>
<body>
    <div class="box">Relative Box</div> 
</body>
</html>
