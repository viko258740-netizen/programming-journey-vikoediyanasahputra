<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas posiiton fixed</title>
    <style>
    body {
      height: 1000px;
      margin: 0;
    }

     .box {
      position: absolute;
      top: 0;
      left: 0;
      width: 200px;
      height: 200px;
      background: rgb(52, 255, 25)
     }

    .top {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgb(232, 30, 30);
      color: white;
      padding: 5px;
      text-decoration: none;
    }

    .kiri {
      position: fixed;
      top: 50%;
      left: 0;
      background: rgb(40, 255, 255);
      color: white;
      padding: 5px;
    }

    .kanan {
      position: fixed;
      top: 50%;
      right: 0;
      background: rgb(219, 20, 222);
      color: white;
      padding: 5px;
    }
    </style>
</head>
<body>
    <div class="box"></div>

        <div class="kiri">Kiri</div>
         <div class="kanan">Kanan</div>

     <a href="#" class="top">Top</a>
</body>
</html>
