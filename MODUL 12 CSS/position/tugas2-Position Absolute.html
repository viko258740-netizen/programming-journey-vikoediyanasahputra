<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Absolute</title>

    <style>
        .container { 
            position: relative; 
            width: 300px; 
            height: 300px; 
            background-color: lightgray; 
        }
        .box1 { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background-color: coral; 
            width: 100px; 
            height: 100px; 
        }
        .box2 { 
            position: absolute; 
            top: 190px; 
            right: 10px; 
            background-color: aqua; 
            width: 100px; 
            height: 100px; 
        }
    </style>
</head>
<body>
    <div class="container"> 
        <div class="box1">Absolute 1</div> 
        <div class="box2">Absolute 2</div>
    </div> 
</body>
</html>
