<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warna pada CSS</title>
    <style>
    .warna-rgb{
        background-color: rgb(46, 46, 208);
        color: rgb(255, 0, 0);
        padding: 10px;
        margin: 5px;
    }
    .warna-rgba{
        background-color: rgba(194, 58, 58, 0.5);
        color: rgb(213, 255, 27);
        padding: 10px;
        margin: 5px;
    }
    .warna-hsl{
        background-color: hsl(240, 100%, 50%);
        color:white;
        padding: 10px;
        margin: 5px;
    }
    .warna-hsla{
        background-color: hsla(120, 100%, 25%, 0.7);
        color: white;
        padding: 10px;
        margin: 5px;
    }
    </style>
</head>
<body>
    <div class="warna-rgb">Teks ini diwarnai menggunakan RGB.</div>
    <div class="warna-rgba">Teks ini diwarnai menggunakan RGBA</div>
    <div class="warna-hsl">Teks ini diwarnai menggunakan HSL</div>
    <div class="warna-hsla">Teks ini iwarnai menggunakan HSLA</div>
</body>
</html>
