<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background color</title>
    <style>
        .bgcolor {
            background-color: yellow;
            padding: 20px;
            margin: 10px;
        }
        .bgcolor-rgb {
            background-color: rgb( 0, 128,0);
            padding: 20px;
            margin: 10px;
            color: white;
        }
        .bgcolor-rgba {
            background-color: rgba(225, 0, 0, 5);
            padding: 20px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="bgcolor">Warna latar belakang</div>
    <div class="bgcolor-rgb">Warna latar belakang dengan RGBA</div>
    <div class="bgcolor-rgba">Warna latar belakang denga RGBA</div>
</body>
</html>
